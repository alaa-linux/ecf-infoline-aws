apiVersion: apps/v1
kind: Deployment
metadata:
  name: infoline-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infoline-frontend
  template:
    metadata:
      labels:
        app: infoline-frontend
    spec:
      containers:
        - name: infoline-frontend
          image: 377152274560.dkr.ecr.eu-west-3.amazonaws.com/infoline-frontend:1.1
          ports:
            - containerPort: 80
